name: Deploy to DOMO

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  dev-deploy:
    name: Dev Deploy (develop → DOMO overwrite)
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to DOMO
        uses: DomoApps/domo-publish-action@v1
        with:
          domo-access-token: ${{ secrets.DOMO_TOKEN }}
          build-command: echo "Already built"
          domo-instance: ${{ secrets.DOMO_INSTANCE }}
          working-directory: ./build

  release-deploy:
    name: Release Deploy (main → new DOMO version)
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to DOMO
        uses: DomoApps/domo-publish-action@v1
        with:
          domo-access-token: ${{ secrets.DOMO_TOKEN }}
          build-command: echo "Already built"
          domo-instance: ${{ secrets.DOMO_INSTANCE }}
          working-directory: ./build

      - name: Lock DOMO version and tag release
        run: |
          npm install -g ryuu
          domo login -i ${{ secrets.DOMO_INSTANCE }} -t ${{ secrets.DOMO_TOKEN }}
          VERSION=$(node -p "require('./manifest.json').version")
          domo release -v "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
